{% extends "base.html" %}
{% block title %}{{ action }} client — ClientKeep{% endblock %}
{% block page_title %}{{ action }} client{% endblock %}

{% block content %}
<div style="max-width:560px;">
  <div class="card">
    <div class="card-head">
      <span class="card-head-title">Client details</span>
    </div>
    <div class="card-body">
      <form method="POST">

        <div class="field">
          <label class="field-label" for="name">Full name <span style="color:var(--danger)">*</span></label>
          <input class="field-input" type="text" id="name" name="name" required
            value="{{ client.name if client else '' }}"
            placeholder="e.g. Jane Smith"/>
        </div>

        <div class="grid-2">
          <div class="field">
            <label class="field-label" for="email">Email</label>
            <input class="field-input" type="email" id="email" name="email"
              value="{{ client.email if client else '' }}"
              placeholder="jane@example.com"/>
          </div>
          <div class="field">
            <label class="field-label" for="phone">Phone</label>
            <input class="field-input" type="text" id="phone" name="phone"
              value="{{ client.phone if client else '' }}"
              placeholder="+1 555 000 0000"/>
          </div>
        </div>

        <div class="field">
          <label class="field-label" for="company">Company</label>
          <input class="field-input" type="text" id="company" name="company"
            value="{{ client.company if client else '' }}"
            placeholder="Acme Inc."/>
        </div>

        <div class="field">
          <label class="field-label" for="notes">Notes</label>
          <textarea class="field-input" id="notes" name="notes"
            placeholder="Any additional notes about this client…">{{ client.notes if client else '' }}</textarea>
        </div>

        <div style="display:flex;align-items:center;gap:8px;padding-top:4px;">
          <button type="submit" class="btn btn-primary">
            <i data-lucide="{{ 'save' if action=='Edit' else 'plus' }}"></i>
            {{ 'Save changes' if action=='Edit' else 'Add client' }}
          </button>
          <a href="{{ url_for('clients.index') }}" class="btn btn-ghost">Cancel</a>
        </div>

      </form>
    </div>
  </div>
</div>
{% endblock %}
