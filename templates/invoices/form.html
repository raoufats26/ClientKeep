{% extends "base.html" %}
{% block title %}{{ action }} invoice — ClientKeep{% endblock %}
{% block page_title %}{{ action }} invoice{% endblock %}

{% block content %}
<div style="max-width:560px;">
  <div class="card">
    <div class="card-head"><span class="card-head-title">Invoice details</span></div>
    <div class="card-body">
      <form method="POST">

        <div class="field">
          <label class="field-label" for="client_id">Client <span style="color:var(--danger)">*</span></label>
          <select class="field-input" id="client_id" name="client_id" required>
            <option value="">Select a client…</option>
            {% for c in clients %}
            <option value="{{ c.id }}" {% if invoice and invoice.client_id == c.id %}selected{% endif %}>
              {{ c.name }}{% if c.company %} — {{ c.company }}{% endif %}
            </option>
            {% endfor %}
          </select>
        </div>

        <div class="field">
          <label class="field-label" for="service">Service / Description <span style="color:var(--danger)">*</span></label>
          <input class="field-input" type="text" id="service" name="service" required
            value="{{ invoice.service if invoice else '' }}"
            placeholder="e.g. Website redesign, Monthly retainer…"/>
        </div>

        <div class="grid-2">
          <div class="field">
            <label class="field-label" for="amount">Amount <span style="color:var(--danger)">*</span></label>
            <div style="position:relative;">
              <span style="position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--text-3);font-weight:500;">{{ current_user.currency }}</span>
              <input class="field-input" type="number" id="amount" name="amount" required step="0.01" min="0"
                value="{{ invoice.amount if invoice else '' }}" placeholder="0.00"
                style="padding-left:{% if current_user.currency|length > 1 %}44px{% else %}28px{% endif %};"/>
            </div>
          </div>
          <div class="field">
            <label class="field-label" for="due_date">Due date</label>
            <input class="field-input" type="date" id="due_date" name="due_date"
              value="{{ invoice.due_date.strftime('%Y-%m-%d') if invoice and invoice.due_date else '' }}"/>
          </div>
        </div>

        <div class="field">
          <label class="field-label" for="notes">Notes</label>
          <textarea class="field-input" id="notes" name="notes" placeholder="Payment terms, extra details…">{{ invoice.notes if invoice else '' }}</textarea>
        </div>

        <!-- Recurring -->
        <div class="field" style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:14px;">
          <label style="display:flex;align-items:center;gap:9px;cursor:pointer;margin-bottom:0;">
            <input type="checkbox" name="is_recurring" id="recurChk"
              {% if invoice and invoice.is_recurring %}checked{% endif %}
              onchange="document.getElementById('recurOpts').style.display=this.checked?'':'none'"
              style="accent-color:var(--accent);width:13px;height:13px;"/>
            <span style="font-size:13px;font-weight:500;color:var(--text-1);">Recurring invoice</span>
            <span style="font-size:12px;color:var(--text-3);margin-left:2px;">Auto-repeat this invoice</span>
          </label>
          <div id="recurOpts" style="display:{% if invoice and invoice.is_recurring %}block{% else %}none{% endif %};margin-top:12px;">
            <label class="field-label">Repeat every</label>
            <select class="field-input" name="recur_interval" style="max-width:180px;">
              <option value="monthly"   {% if invoice and invoice.recur_interval=='monthly'   %}selected{% endif %}>Month</option>
              <option value="quarterly" {% if invoice and invoice.recur_interval=='quarterly' %}selected{% endif %}>Quarter (3 months)</option>
            </select>
          </div>
        </div>

        <div style="display:flex;align-items:center;gap:8px;margin-top:18px;">
          <button type="submit" class="btn btn-primary">
            <i data-lucide="{{ 'save' if action=='Edit' else 'plus' }}"></i>
            {{ 'Save changes' if action=='Edit' else 'Create invoice' }}
          </button>
          <a href="{{ url_for('invoices.index') }}" class="btn btn-ghost">Cancel</a>
        </div>

      </form>
    </div>
  </div>
</div>
{% endblock %}
